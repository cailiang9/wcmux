<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>wcmux</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <link rel="stylesheet" href="{{ base_url }}/static/style.css" />
</head>
<body>
  <div id="toolbar">
    <button id="brand-btn" class="brand" title="Show all tabs" aria-haspopup="menu"
            aria-expanded="false">wcmux<span class="caret">▾</span></button>
    <div id="tab-menu" role="menu" hidden></div>
    <div id="tabs"></div>
    <button id="new-tab" title="New tab (Ctrl+Alt+T)">+</button>
    <span id="status" class="status" title="connecting"></span>
    <button id="help-btn" class="logout" title="Keyboard shortcuts" aria-label="Keyboard shortcuts">?</button>
    <form method="POST" action="{{ base_url }}/logout" style="margin-left:auto">
      <button type="submit" class="logout">logout</button>
    </form>
  </div>
  <dialog id="help-dialog">
    <h3>Keyboard shortcuts</h3>
    <table>
      <tr><th colspan="2">Tabs</th></tr>
      <tr><td><kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>T</kbd></td><td>New tab</td></tr>
      <tr><td><kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>W</kbd></td><td>Close current tab</td></tr>
      <tr><td><kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>←</kbd> / <kbd>→</kbd></td><td>Prev / next tab (cyclic)</td></tr>
      <tr><td><kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>1</kbd>…<kbd>9</kbd></td><td>Jump to tab by index</td></tr>
      <tr><th colspan="2">Virtual keypad modifiers</th></tr>
      <tr><td>Tap <kbd>Ctrl</kbd> / <kbd>Alt</kbd></td><td>Next character combines with it (e.g. tap Ctrl then type <kbd>d</kbd> → Ctrl-D)</td></tr>
    </table>
    <form method="dialog"><button>Close</button></form>
  </dialog>
  <div id="terminals"></div>
  <div id="keypad">
    <div class="kp-row">
      <button class="kp mod" data-mod="ctrl"  title="Ctrl (sticky)">Ctrl</button>
      <button class="kp mod" data-mod="alt"   title="Alt (sticky)">Alt</button>
      <button class="kp"     data-key="esc"   title="Escape">Esc</button>
      <button class="kp"     data-key="tab"   title="Tab">Tab</button>
      <button class="kp"     data-key="home"  title="Home">Home</button>
      <button class="kp"     data-key="end"   title="End">End</button>
      <button class="kp"     data-key="altbksp" title="Alt+Backspace (backward-kill-word)">⌥⌫</button>
    </div>
    <div class="kp-row">
      <button class="kp"     data-key="pgup"  title="Page Up">PgUp</button>
      <button class="kp"     data-key="pgdn"  title="Page Down">PgDn</button>
      <button class="kp"     data-key="ctrlb" title="Ctrl+B (tmux prefix)">^B</button>
      <button class="kp"     data-key="rbracket" title="]">]</button>
      <button class="kp"     data-key="backtick" title="Backtick">`</button>
      <button class="kp"     data-key="backslash" title="Backslash">\</button>
      <button class="kp"     data-key="left"  title="Left">←</button>
      <button class="kp"     data-key="up"    title="Up">↑</button>
      <button class="kp"     data-key="down"  title="Down">↓</button>
      <button class="kp"     data-key="right" title="Right">→</button>
    </div>
  </div>
  <script>
    window.WCMUX_BASE_URL = {{ base_url|tojson }};
  </script>
  <script src="{{ base_url }}/static/app.js"></script>
</body>
</html>
