<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .share-btn { background: none; border: 1px solid #555; color: inherit;
                 cursor: pointer; padding: 4px 10px; border-radius: 3px;
                 font-size: .85em; margin-right: 6px; }
    .share-btn:hover { background: rgba(125,125,125,.1); }
    .share-dialog { width: min(520px, 92vw); border: 1px solid #444;
                    border-radius: 6px; padding: 18px 20px; background: #1d1d1d;
                    color: #ddd; }
    .share-dialog::backdrop { background: rgba(0,0,0,.55); }
    [data-theme="light"] .share-dialog { background: #fff; color: #222;
                                         border-color: #ccc; }
    .share-dialog h3 { margin: 0 0 12px; }
    .share-dialog .row { display: flex; gap: 10px; align-items: center;
                         margin: 10px 0; }
    .share-dialog .row > span { flex: 0 0 80px; }
    .share-dialog input, .share-dialog select { flex: 1 1 auto; padding: 5px 8px;
                                                background: #2a2a2a; color: #ddd;
                                                border: 1px solid #444; border-radius: 3px; }
    [data-theme="light"] .share-dialog input,
    [data-theme="light"] .share-dialog select { background: #f7f7f7; color: #222; border-color: #ccc; }
    .share-dialog .buttons { justify-content: flex-end; margin-top: 16px; }
    .share-dialog .buttons button { padding: 5px 14px; cursor: pointer; }
    .share-dialog #share-submit { background: #2d4a6a; color: #fff;
                                  border: 1px solid #3a5f86; }
    .share-dialog #share-revoke { background: #6a2d2d; color: #fff;
                                  border: 1px solid #863a3a; }
    .share-url-wrap { display: flex; gap: 6px; flex: 1 1 auto; }
    .share-url-wrap input { font-family: ui-monospace, Menlo, monospace; font-size: .85em; }
    .share-skipped { color: #c80; font-size: .85em; flex-basis: 100%; }
  </style>
  <!-- highlight.js via CDN -->
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    // Apply saved theme immediately to avoid flash
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
</head>
<body>
<div id="app">
  <div class="preview-header">
    <a class="back-btn" id="back-btn" href="index.html">← 返回</a>
    <div class="file-title" id="file-title">Loading...</div>
    <button class="share-btn" id="share-btn" title="分享此文件">🔗 分享</button>
    <button class="theme-toggle" id="theme-toggle" title="切换主题"></button>
  </div>
  <div id="content"><div class="state-msg"><div class="icon">⏳</div>Loading...</div></div>
</div>

<dialog id="share-dialog" class="share-dialog">
  <form method="dialog" id="share-form">
    <h3>分享此文件</h3>
    <label class="row">
      <span>过期时间</span>
      <select id="share-expires">
        <option value="1d">1 天</option>
        <option value="7d">7 天</option>
        <option value="1mo">1 个月</option>
        <option value="3mo">3 个月</option>
        <option value="1y" selected>1 年</option>
        <option value="3y">3 年</option>
        <option value="never">永不过期</option>
      </select>
    </label>
    <label class="row">
      <span>备注</span>
      <input id="share-label" type="text" maxlength="200" placeholder="可选,自己看的标签 e.g. 给小张" />
    </label>
    <div class="row" id="share-result" hidden>
      <div class="share-url-wrap">
        <input id="share-url" type="text" readonly />
        <button type="button" id="share-copy">复制</button>
      </div>
      <div id="share-skipped" class="share-skipped" hidden></div>
    </div>
    <div class="row buttons">
      <button type="button" id="share-cancel">关闭</button>
      <button type="button" id="share-revoke" hidden>撤销</button>
      <button type="button" id="share-submit">生成链接</button>
    </div>
  </form>
</dialog>

<script>
// Theme toggle
function getTheme() { return localStorage.getItem('theme') || 'dark'; }
function applyTheme(theme) {
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  document.getElementById('theme-toggle').textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
  document.getElementById('hljs-theme').href = theme === 'light'
    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css'
    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
}
applyTheme(getTheme());
document.getElementById('theme-toggle').addEventListener('click', () => {
  const next = getTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next);
  applyTheme(next);
});

function getPath() {
  return new URLSearchParams(location.search).get('path') || '';
}

// Spec §4.22: opened in a new window from wcmux's search dropdown; backing to
// the file browser SPA should stay inside the preview namespace, not jump to
// some absolute root that wouldn't exist when wcmux is reverse-proxied.
const PREVIEW_INDEX = 'index.html';

function getDir(p) {
  const parts = p.split('/');
  parts.pop();
  return parts.join('/');
}

function getFilename(p) {
  return p.split('/').pop();
}

function setTitle(path) {
  const name = getFilename(path);
  const dir = getDir(path);
  document.title = name + ' - Preview';
  document.getElementById('file-title').innerHTML =
    `${name} <span>${dir ? '~/' + dir : '~'}</span>`;
}

function setBackLink(path) {
  const dir = getDir(path);
  const btn = document.getElementById('back-btn');
  btn.href = dir ? `${PREVIEW_INDEX}?path=${encodeURIComponent(dir)}` : PREVIEW_INDEX;
}

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
  });
}

function renderCode(content, lang) {
  const pre = document.createElement('pre');
  const code = document.createElement('code');
  code.className = lang ? `language-${lang}` : '';
  code.textContent = content;
  pre.appendChild(code);

  const wrap = document.createElement('div');
  wrap.className = 'code-wrap';

  const toolbar = document.createElement('div');
  toolbar.className = 'code-toolbar';
  toolbar.innerHTML = `<span class="code-lang">${lang || 'text'}</span>`;

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = '复制';
  copyBtn.onclick = () => copyToClipboard(content, copyBtn);
  toolbar.appendChild(copyBtn);

  wrap.appendChild(toolbar);
  wrap.appendChild(pre);
  return wrap;
}

async function load() {
  const path = getPath();
  if (!path) { location.href = PREVIEW_INDEX; return; }

  setTitle(path);
  setBackLink(path);

  const content = document.getElementById('content');

  try {
    const res = await fetch('../../api/preview/file?path=' + encodeURIComponent(path));
    if (!res.ok) {
      const msg = await res.text();
      content.innerHTML = `<div class="state-msg"><div class="icon">❌</div>${res.status === 404 ? '不支持的文件类型或文件不存在' : msg}</div>`;
      return;
    }
    const data = await res.json();

    if (data.type === 'markdown') {
      const div = document.createElement('div');
      div.className = 'md-body';
      div.innerHTML = data.html;
      // highlight code blocks inside markdown
      div.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
      content.innerHTML = '';
      content.appendChild(div);

    } else if (data.type === 'code') {
      let displayContent = data.content;
      if (data.lang === 'json') {
        try { displayContent = JSON.stringify(JSON.parse(data.content), null, 2); } catch(e) {}
      }
      const wrap = renderCode(displayContent, data.lang);
      content.innerHTML = '';
      content.appendChild(wrap);
      wrap.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));

    } else if (data.type === 'text') {
      const wrap = document.createElement('div');
      wrap.className = 'text-wrap';
      const pre = document.createElement('pre');
      pre.textContent = data.content;
      wrap.appendChild(pre);
      content.innerHTML = '';
      content.appendChild(wrap);

    } else if (data.type === 'image') {
      const wrap = document.createElement('div');
      wrap.className = 'img-wrap';
      const img = document.createElement('img');
      img.src = '../../raw/preview?path=' + encodeURIComponent(path);
      img.alt = getFilename(path);
      wrap.appendChild(img);
      content.innerHTML = '';
      content.appendChild(wrap);

    } else if (data.type === 'html') {
      const wrap = document.createElement('div');
      wrap.className = 'html-wrap';
      const iframe = document.createElement('iframe');
      iframe.src = '../../raw/preview?path=' + encodeURIComponent(path);
      iframe.style.cssText = 'width:100%;border:none;background:#fff;border-radius:8px;';
      // Auto-resize iframe height to content
      iframe.onload = () => {
        try {
          iframe.style.height = iframe.contentDocument.documentElement.scrollHeight + 'px';
        } catch(e) {
          iframe.style.height = '80vh';
        }
      };
      iframe.style.height = '80vh';
      wrap.appendChild(iframe);
      content.innerHTML = '';
      content.appendChild(wrap);

    } else if (data.type === 'jsonl') {
      renderJsonl(data, content);

    } else if (data.type === 'drawio') {
      document.getElementById('app').classList.add('drawio-mode');
      initDrawio(data.content, path, content);
    }

  } catch (e) {
    content.innerHTML = `<div class="state-msg"><div class="icon">❌</div>${e.message}</div>`;
  }
}

function renderJsonl(data, container) {
  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'jsonl-wrap';

  if (data.truncated) {
    const banner = document.createElement('div');
    banner.className = 'jsonl-banner';
    banner.textContent = `已截断（共 ${data.total} 行，显示前 ${data.records.length} 行）`;
    wrap.appendChild(banner);
  }

  for (const rec of data.records) {
    const row = document.createElement('div');
    row.className = 'jsonl-row' + (rec.ok ? '' : ' jsonl-error');

    const num = document.createElement('span');
    num.className = 'jsonl-lineno';
    num.textContent = rec.line;
    row.appendChild(num);

    const pre = document.createElement('pre');
    const code = document.createElement('code');
    if (rec.ok) {
      code.className = 'language-json';
      code.textContent = JSON.stringify(rec.json, null, 2);
    } else {
      const err = document.createElement('div');
      err.className = 'jsonl-error-tag';
      err.textContent = 'parse error';
      row.appendChild(err);
      code.className = 'language-plaintext';
      code.textContent = rec.raw;
    }
    pre.appendChild(code);
    row.appendChild(pre);
    wrap.appendChild(row);
  }

  container.appendChild(wrap);
  wrap.querySelectorAll('pre code.language-json').forEach(b => hljs.highlightElement(b));
}

function initDrawio(xml, filePath, container) {
  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'drawio-wrap';

  const iframe = document.createElement('iframe');
  iframe.id = 'drawio-editor';
  iframe.style.cssText = 'width:100%;height:85vh;border:none;border-radius:8px;background:#fff;';
  const dark = getTheme() === 'dark' ? '1' : '0';
  iframe.src = 'https://embed.diagrams.net/?embed=1&proto=json&spin=1&dark=' + dark;
  wrap.appendChild(iframe);
  container.appendChild(wrap);

  window.addEventListener('message', function handler(evt) {
    if (evt.origin !== 'https://embed.diagrams.net') return;
    let msg;
    try { msg = JSON.parse(evt.data); } catch(e) { return; }

    if (msg.event === 'init') {
      iframe.contentWindow.postMessage(JSON.stringify({
        action: 'load',
        xml: xml,
        autosave: 0
      }), '*');
    } else if (msg.event === 'save') {
      // Save back to server
      fetch('../../api/preview/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ path: filePath, content: msg.xml })
      }).then(r => {
        if (r.ok) {
          // Tell drawio save is done, keep editing
          iframe.contentWindow.postMessage(JSON.stringify({
            action: 'status', message: 'Saved', modified: false
          }), '*');
        }
      });
    } else if (msg.event === 'exit') {
      window.removeEventListener('message', handler);
      const dir = getDir(filePath);
      location.href = dir ? `${PREVIEW_INDEX}?path=${encodeURIComponent(dir)}` : PREVIEW_INDEX;
    }
  });
}

load();

// ---- spec §4.23: share dialog ----
(function () {
  const dlg = document.getElementById('share-dialog');
  const btn = document.getElementById('share-btn');
  const submit = document.getElementById('share-submit');
  const cancel = document.getElementById('share-cancel');
  const revoke = document.getElementById('share-revoke');
  const expSel = document.getElementById('share-expires');
  const labelInp = document.getElementById('share-label');
  const result = document.getElementById('share-result');
  const urlInp = document.getElementById('share-url');
  const copyBtn = document.getElementById('share-copy');
  const skippedEl = document.getElementById('share-skipped');
  let currentId = null;

  function showResult(payload) {
    currentId = payload.id;
    urlInp.value = new URL(payload.url, location.origin).href;
    result.hidden = false;
    submit.hidden = true;
    revoke.hidden = false;
    if (payload.assets_skipped && payload.assets_skipped.length) {
      const lines = payload.assets_skipped
        .map(s => `· ${s.path}: ${s.reason}`).join('<br>');
      skippedEl.innerHTML = `${payload.assets_skipped.length} 张图片未打包：<br>${lines}`;
      skippedEl.hidden = false;
    } else {
      skippedEl.hidden = true;
    }
  }
  function resetDialog() {
    currentId = null;
    result.hidden = true;
    submit.hidden = false;
    revoke.hidden = true;
    skippedEl.hidden = true;
    urlInp.value = '';
  }

  btn.addEventListener('click', () => {
    resetDialog();
    if (typeof dlg.showModal === 'function') dlg.showModal();
    else dlg.setAttribute('open', '');
  });
  cancel.addEventListener('click', () => dlg.close());

  submit.addEventListener('click', async () => {
    submit.disabled = true;
    try {
      const path = getPath();
      const r = await fetch('../../api/share', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({
          path: path,
          expires_in: expSel.value,
          label: labelInp.value || '',
        }),
      });
      if (r.status === 401) { location.href = '../../login'; return; }
      if (!r.ok) {
        let msg = `HTTP ${r.status}`;
        try { msg = (await r.json()).detail || msg; } catch {}
        skippedEl.textContent = '生成失败: ' + msg;
        skippedEl.hidden = false;
        return;
      }
      showResult(await r.json());
    } finally {
      submit.disabled = false;
    }
  });

  revoke.addEventListener('click', async () => {
    if (!currentId) return;
    if (!confirm('确认撤销此分享链接？')) return;
    revoke.disabled = true;
    try {
      const r = await fetch('../../api/share/' + encodeURIComponent(currentId), {
        method: 'DELETE', credentials: 'same-origin',
      });
      if (r.ok) { dlg.close(); }
    } finally {
      revoke.disabled = false;
    }
  });

  copyBtn.addEventListener('click', () => {
    urlInp.select();
    navigator.clipboard.writeText(urlInp.value).then(() => {
      copyBtn.textContent = '✓';
      setTimeout(() => { copyBtn.textContent = '复制'; }, 1500);
    }).catch(() => {});
  });
})();
</script>
</body>
</html>
